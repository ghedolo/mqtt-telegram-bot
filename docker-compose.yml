services:
  bot:
    build: .
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /app/tmp
    volumes:
      - ./data:/app/data
      # Config source path is overridable so it can live in a separate,
      # git-crypt-encrypted backup repo (see docs/BACKUP.md). Default '.' keeps
      # the legacy in-place layout; production sets LORTE_CONFIG in .env.
      - ${LORTE_CONFIG:-.}/sensors.d:/app/sensors.d:ro
      - ${LORTE_CONFIG:-.}/credentials.yaml:/app/credentials.yaml:ro
    environment:
      - TZ=Europe/Rome
      - MPLCONFIGDIR=/tmp/matplotlib
    mem_limit: 512m
    pids_limit: 128
    cpus: 1.0
