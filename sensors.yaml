sensors:
  DEI-P2_T:
    topic: "esp32LRX/1/lora/dataRx/1/temperature"
    info: "DEI Piano 2 - Temp"
    unit: "°C"
    defaultAlarm: 30.0
  DEI-P2_P:
    topic: "esp32LRX/1/lora/dataRx/1/pressure"
    info: "DEI Piano 2 - Press"
    unit: "hPa"
  DEI-P2_rssi:
    topic: "esp32LRX/1/lora/dataRx/1/rssiAtTX"
    info: "DEI Piano 2 - RSSI"
    unit: "dBm"
  DEI-P2_hall:
    topic: "esp32LRX/1/lora/dataRx/1/hall"
    info: "DEI Piano 2 - Hall"

  UG_T:
    topic: "esp32LRX/1/lora/dataRx/2/temperature"
    info: "Piano Terra - Temp"
    unit: "°C"
    defaultAlarm: 30.0
  UG_P:
    topic: "esp32LRX/1/lora/dataRx/2/pressure"
    info: "Piano Terra - Press"
    unit: "hPa"
  UG_rssi:
    topic: "esp32LRX/1/lora/dataRx/2/rssiAtTX"
    info: "Piano Terra - RSSI"
    unit: "dBm"
  UG_hall:
    topic: "esp32LRX/1/lora/dataRx/2/hall"
    info: "Piano Terra - Hall"

defaults:
  interval: 300          # seconds between expected sensor readings
  retention_days: 30     # days of readings to keep in DB
  alarm_threshold_repeat: 720    # seconds between threshold alarm repeats (12 min)
  alarm_offline_repeat: 3600     # seconds between offline alarm repeats (60 min)
  debug: 0                       # 0=silent, 1=info, 2=debug (verbose)
